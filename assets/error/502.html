<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta http-equiv="refresh" content="5" />
        <title>Bad Gateway — Mido's House</title>
        <style>
            body {
                font-family: system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            }

            .warning {
                border: 1px solid #909000;
            }

            p.warning {
                background-color: #ffff90;
                padding: 8px;
            }

            @media (prefers-color-scheme: dark) {
                body {
                    background-color: black;
                    color: white;
                }

                .warning {
                    border-color: #ffff00;
                }

                p.warning {
                    background-color: #404000;
                }
            }
        </style>
    </head>
    <body>
        <h1>Error 502: Bad Gateway</h1>
        <p>Mido's House is currently offline. It's probably being updated and will be back in a couple seconds. If this error persists, please contact Fenhl on Discord.</p>
        <script>
            document.querySelectorAll('.datetime').forEach(function(dateTime) {
                var longFormat = dateTime.dataset.long == 'true';
                dateTime.textContent = new Date(parseInt(dateTime.dataset.timestamp)).toLocaleString([], {
                    dateStyle: longFormat ? 'full' : 'medium',
                    timeStyle: longFormat ? 'full' : 'short',
                });
            });
        </script>
    </body>
</html>
